<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airx Async Data Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        padding: 2rem;
        background: #f5f5f5;
        margin: 0;
      }
      #app { width: 100%; max-width: 600px; }
      .card {
        background: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        margin-bottom: 1rem;
      }
      h1 { color: #333; margin-top: 0; }
      .loading { color: #888; font-style: italic; }
      .error { color: #ef4444; background: #fef2f2; padding: 1rem; border-radius: 8px; }
      .user-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin-bottom: 0.5rem; }
      .user-card h3 { margin: 0 0 0.25rem 0; color: #333; }
      .user-card p { margin: 0; color: #666; font-size: 0.875rem; }
      button {
        padding: 0.5rem 1rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #4f46e5; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./source/main.ts"></script>
  </body>
</html>
