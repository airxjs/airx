<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airx Counter Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      #app { text-align: center; }
      .card {
        background: white;
        padding: 2rem 3rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      }
      h1 { color: #333; margin-bottom: 0.5rem; }
      .count { font-size: 4rem; font-weight: bold; color: #6366f1; margin: 1rem 0; }
      .double { font-size: 1.5rem; color: #888; margin-bottom: 1.5rem; }
      button {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 0 0.25rem;
        transition: background 0.2s;
      }
      button.increment { background: #6366f1; color: white; }
      button.increment:hover { background: #4f46e5; }
      button.decrement { background: #ef4444; color: white; }
      button.decrement:hover { background: #dc2626; }
      button.reset { background: #888; color: white; }
      button.reset:hover { background: #666; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./source/main.ts"></script>
  </body>
</html>
