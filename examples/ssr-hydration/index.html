<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airx SSR Hydration Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        background: #f5f5f5;
        margin: 0;
      }
      #app { max-width: 600px; margin: 0 auto; }
      .card {
        background: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      }
      h1 { color: #333; margin-top: 0; }
      .info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      .info code { background: #dbeafe; padding: 0.125rem 0.375rem; border-radius: 4px; }
      .post { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
      .post h3 { margin: 0 0 0.5rem 0; color: #333; }
      .post p { margin: 0; color: #666; }
      .ssr-output { background: #1f2937; color: #e5e7eb; padding: 1rem; border-radius: 8px; font-size: 0.75rem; word-break: break-all; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- SSR HTML will be rendered here by server -->
    </div>
    <script type="module" src="./source/client.ts"></script>
  </body>
</html>
