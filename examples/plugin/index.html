<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airx Plugin Example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 2rem;
      }
      #app { max-width: 600px; margin: 0 auto; }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      }
      h1 { color: #333; margin-top: 0; }
      button {
        padding: 0.75rem 1.5rem;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
      }
      button:hover { background: #4f46e5; }
      .plugin-info {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        padding: 1rem;
        margin-top: 1.5rem;
        font-size: 0.875rem;
      }
      .plugin-info h3 { margin: 0 0 0.5rem 0; color: #166534; }
      .plugin-info p { margin: 0; color: #15803d; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./source/main.ts"></script>
  </body>
</html>
