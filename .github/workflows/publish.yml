name: Publish package to npm

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - uses: actions/cache@v4
        id: build-output
        with:
          path: ./*
          key: ${{ github.sha }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/cache@v4
        id: build-output
        with:
          path: ./*
          key: ${{ github.sha }}
      - uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Publish package with correct dist-tag
        run: |
          npm config delete always-auth || true

          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            npm publish --tag "$TAG"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
