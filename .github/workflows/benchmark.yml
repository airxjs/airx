name: Performance Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for baseline comparison

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run benchmarks
        run: npm run benchmark
        id: benchmark

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmark-results.json
          retention-days: 30

      - name: Compare with baseline (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Try to find baseline from main branch
          git fetch origin main:main
          if [ -f main/benchmark-results.json ]; then
            echo "📂 Found baseline from main branch"
            node scripts/compare-benchmark.js
          else
            echo "⚠️ No baseline found in main branch, skipping comparison"
          fi
        env:
          BASELINE_FILE: ./main/benchmark-results.json
          REGRESSION_THRESHOLD: 0.15
        continue-on-error: true

      - name: Update baseline on main (on push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "📝 Updating baseline on main branch"
          cp benchmark-results.json benchmark-results-baseline.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark-results-baseline.json
          git diff --cached --exit-code && echo "No baseline changes needed" || {
            git commit -m "perf(benchmark): update performance baseline
            Refs: automated"
            git push
          }